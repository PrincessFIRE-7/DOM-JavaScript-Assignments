<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Shopping Cart</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { display: flex; gap: 40px; flex-wrap: wrap; }
        .products, .cart { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); min-width: 300px; }
        .product-item, .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        button { background-color: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .remove-btn { background-color: #dc3545; }
        .remove-btn:hover { background-color: #c82333; }
        .total { font-size: 1.2em; font-weight: bold; margin-top: 15px; text-align: right; border-top: 2px solid #333; padding-top: 10px; }
    </style>
</head>
<body>
    <h2>Shopping Cart System</h2>
    <div class="container">
        <div class="products">
            <h3>Available Products</h3>
            <div id="product-list"></div>
        </div>
        <div class="cart">
            <h3>Your Cart</h3>
            <div id="cart-list"><p id="empty-message">Your cart is empty.</p></div>
            <div class="total">Total: ₦<span id="cart-total">0</span></div>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
