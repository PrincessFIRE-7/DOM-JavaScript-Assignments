<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Results Table</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f8f9fa; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007bff; color: white; }
        .pass { color: #28a745; font-weight: bold; }
        .fail { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Departmental Performance Sheet (CSC101 - CSC103)</h2>
    <table id="results-table">
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Average Score</th>
                <th>Status (Pass Mark: 50)</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>
    <script src="script.js" defer></script>
</body>
</html>
