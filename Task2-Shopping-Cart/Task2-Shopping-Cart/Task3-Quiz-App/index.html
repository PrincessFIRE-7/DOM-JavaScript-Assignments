<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz App</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; transition: background-color 0.5s ease; }
        .quiz-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 400px; text-align: center; }
        .options-container { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .option-btn { padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; }
        .option-btn:hover { background-color: #0056b3; }
        #score-display { font-size: 1.3em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="quiz-card" id="quiz-box">
        <h3 id="question-text">Loading Question...</h3>
        <div class="options-container" id="options-box"></div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
